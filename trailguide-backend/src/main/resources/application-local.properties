spring.datasource.url=jdbc:h2:mem:trailguide_local;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
server.port=8080
server.ssl.enabled=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

trailguide.jwt.secret=local-secret-local-secret-local-secret-local-secret
trailguide.jwt.expiration-minutes=1440
