spring.application.name=trailguide-backend
server.port=${SERVER_PORT:8443}
server.ssl.enabled=${SERVER_SSL_ENABLED:true}
server.ssl.key-store=${SERVER_SSL_KEY_STORE:file:../certs/trailguide-dev.p12}
server.ssl.key-store-password=${SERVER_SSL_KEY_STORE_PASSWORD:}
server.ssl.key-store-type=${SERVER_SSL_KEY_STORE_TYPE:PKCS12}
server.ssl.key-alias=${SERVER_SSL_KEY_ALIAS:trailguide}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/trailguide}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:trailguide}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:trailguide}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=false

trailguide.jwt.secret=${TRAILGUIDE_JWT_SECRET:change-this-development-secret-change-this-development-secret}
trailguide.jwt.expiration-minutes=${TRAILGUIDE_JWT_EXPIRATION_MINUTES:1440}

trailguide.admin.username=${TRAILGUIDE_ADMIN_USERNAME:admin}
trailguide.admin.email=${TRAILGUIDE_ADMIN_EMAIL:admin@example.com}
trailguide.admin.password=${TRAILGUIDE_ADMIN_PASSWORD:AdminPassword123!}

trailguide.firebase.enabled=${TRAILGUIDE_FIREBASE_ENABLED:false}
trailguide.firebase.service-account-path=${TRAILGUIDE_FIREBASE_SERVICE_ACCOUNT_PATH:}
